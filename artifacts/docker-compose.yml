version: '3.8'

services:
  kingwolf:
    build: .
    container_name: kingwolf
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3443:3443"
    volumes:
      - kingwolf_data:/app/data
      - kingwolf_uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HTTPS_PORT=3443
      # Override these in .env file or docker-compose.override.yml
      # - JWT_SECRET=your-strong-secret-here
      # - KW_ADMIN_USER=admin
      # - KW_ADMIN_PASS=changeme
    mem_limit: 512m
    cpus: '1.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: kingwolf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - kingwolf_certs:/etc/nginx/certs:ro
    depends_on:
      - kingwolf
    mem_limit: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  kingwolf_data:
  kingwolf_uploads:
  kingwolf_certs:
