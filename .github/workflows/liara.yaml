name: Deploy to Liara

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Liara CLI
        run: npm install -g @liara/cli

      - name: Deploy to Liara
        run: liara deploy --app="kingwolf" --api-token="${{ secrets.LIARA_API_TOKEN }}" --platform="docker" --detach
