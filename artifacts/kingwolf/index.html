<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>KingWolf Messenger</title>
    <meta name="description" content="KingWolf Messenger" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b0f1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KingWolf" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html, body { margin:0; padding:0; background:#0b0f1a; color:#fff; min-height:100vh; min-height:100dvh; overscroll-behavior:none; }
      #kw-splash {
        position:fixed; inset:0; z-index:9999;
        background: radial-gradient(circle at 50% 40%, #1a1f33 0%, #0b0f1a 70%);
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        transition: opacity .3s ease;
      }
      #kw-splash.hidden { opacity:0; pointer-events:none; }
      #kw-splash .logo {
        width:96px; height:96px; border-radius:24px;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        display:flex; align-items:center; justify-content:center;
        box-shadow: 0 12px 40px rgba(79,70,229,.4); font-size:48px;
      }
      #kw-splash .title {
        margin-top:24px; font-family:'Inter',sans-serif; font-size:24px; font-weight:700;
        background: linear-gradient(90deg, #fff 0%, #c4b5fd 100%);
        -webkit-background-clip:text; background-clip:text; color:transparent;
      }
      #kw-splash .sub { margin-top:8px; opacity:.6; font-size:13px; }
      #kw-splash .dots { margin-top:32px; display:flex; gap:8px; }
      #kw-splash .dots span {
        width:8px; height:8px; border-radius:50%; background:#7c3aed;
        animation: kw-pulse 1.2s infinite ease-in-out;
      }
      #kw-splash .dots span:nth-child(2){ animation-delay:.15s; }
      #kw-splash .dots span:nth-child(3){ animation-delay:.3s; }
      @keyframes kw-pulse {
        0%,80%,100%{ opacity:.3; transform:scale(.8); }
        40%{ opacity:1; transform:scale(1.1); }
      }
    </style>
  </head>
  <body>
    <div id="kw-splash">
      <div class="logo">🐺</div>
      <div class="title">KingWolf Messenger</div>
      <div class="sub">در حال بارگذاری…</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const splash = document.getElementById('kw-splash');
      const root = document.getElementById('root');
      let attempts = 0;
      const check = () => {
        if (root.children.length > 0 || attempts > 100) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 400);
        } else { attempts++; setTimeout(check, 100); }
      };
      check();

      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
